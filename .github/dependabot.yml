version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
      test-tooling:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "jsdom"
      lint-tooling:
        patterns:
          - "eslint"
          - "markdownlint-cli2"

  - package-ecosystem: "pip"
    directory: "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Australia/Sydney"
    open-pull-requests-limit: 3
