name: Deploy static blog to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Python for resume PDFs
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install resume PDF dependencies
        run: python -m pip install -r scripts/resume-pdf-requirements.txt

      - name: Generate resume PDFs
        run: python scripts/generate-resume-pdfs.py

      - name: Verify public-only content
        run: pnpm verify:public

      - name: Test
        run: pnpm test:ci

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Preserve Next.js assets on Pages
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
